name: Verify

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-linux:
    runs-on: ubuntu-24.04
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SDKWORK_REDIS_TEST_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling SDKWork dependencies
        shell: bash
        run: |
          git clone --depth 1 https://github.com/Sdkwork-Cloud/sdkwork-database.git "${GITHUB_WORKSPACE}/../sdkwork-database"
          git clone --depth 1 https://github.com/Sdkwork-Cloud/sdkwork-utils.git "${GITHUB_WORKSPACE}/../sdkwork-utils"
          git clone --depth 1 https://github.com/Sdkwork-Cloud/sdkwork-id.git "${GITHUB_WORKSPACE}/../sdkwork-id" || true
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/sdkwork-web-framework-pc/package-lock.json
      - name: Verify workspace
        run: ./scripts/verify.sh

  verify-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling SDKWork dependencies
        shell: bash
        run: |
          git clone --depth 1 https://github.com/Sdkwork-Cloud/sdkwork-database.git "${GITHUB_WORKSPACE}/../sdkwork-database"
          git clone --depth 1 https://github.com/Sdkwork-Cloud/sdkwork-utils.git "${GITHUB_WORKSPACE}/../sdkwork-utils"
          git clone --depth 1 https://github.com/Sdkwork-Cloud/sdkwork-id.git "${GITHUB_WORKSPACE}/../sdkwork-id" || true
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/sdkwork-web-framework-pc/package-lock.json
      - name: Verify workspace
        shell: pwsh
        run: .\scripts\verify.ps1
