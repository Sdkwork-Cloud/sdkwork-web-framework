name: Verify

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling SDKWork dependencies
        run: |
          git clone --depth 1 https://github.com/Sdkwork-Cloud/sdkwork-database.git "${GITHUB_WORKSPACE}/../sdkwork-database"
          git clone --depth 1 https://github.com/Sdkwork-Cloud/sdkwork-id.git "${GITHUB_WORKSPACE}/../sdkwork-id" || true
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/sdkwork-web-framework-pc/package-lock.json
      - name: Verify workspace
        run: ./scripts/verify.sh
